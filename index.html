<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Militia Web</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #1b1712; color: #f2e9d8;
        font-family: system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; touch-action: none; 
        -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
      #lobby button { touch-action: manipulation; }
      #lobby input { touch-action: manipulation; }
      #game { width: 100vw; height: 100vh; }
      #game canvas { display: block; }
      #lobby { position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background: radial-gradient(circle at 50% 30%, #3a2f22, #140f0a); }
      .card { background: #241d14; border: 1px solid #5a4630; border-radius: 12px;
        padding: 28px 32px; width: 90%; max-width: 320px; box-shadow: 0 12px 40px rgba(0,0,0,.5); }
      .card h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: .5px; }
      .card p { margin: 0 0 18px; font-size: 13px; color: #b6a488; }
      label { display: block; font-size: 12px; margin: 12px 0 4px; color: #cdbb9c; }
      input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #5a4630;
        background: #17120c; color: #f2e9d8; font-size: 15px; }
      input#code { text-transform: uppercase; letter-spacing: 4px; font-weight: 700; }
      .row { display: flex; gap: 10px; margin-top: 18px; }
      button { flex: 1; padding: 11px; border: none; border-radius: 8px; cursor: pointer;
        font-weight: 700; font-size: 14px; }
      #create { background: #c8792a; color: #1b1712; }
      #join { background: #3a2f22; color: #f2e9d8; border: 1px solid #5a4630; }
      button:hover { filter: brightness(1.1); }
      #err { color: #e06b5a; font-size: 12px; min-height: 16px; margin-top: 10px; }
      .hint { font-size: 11px; color: #8c7c63; margin-top: 14px; line-height: 1.5; }
      #game-overlay { position:fixed; inset:0; pointer-events:none; z-index:999; }
      #game-overlay > * { pointer-events:auto; }
      #start-match-btn { display:none; position:absolute; left:50%; top:90px; transform:translateX(-50%);
        padding:10px 32px; font-size:18px; font-weight:bold; border:none; border-radius:8px;
        background:#4caf50; color:#fff; z-index:1000; cursor:pointer; touch-action:manipulation; }
      #mobile-fire { display:none; position:absolute; right:24px; bottom:24px;
        width:72px; height:72px; border-radius:50%; background:rgba(209,74,58,0.7);
        z-index:1000; touch-action:manipulation; }
      #mobile-nade { display:none; position:absolute; right:100px; bottom:50px;
        width:52px; height:52px; border-radius:50%; background:rgba(76,175,80,0.7);
        z-index:1000; touch-action:manipulation; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="lobby">
      <div class="card">
        <h1>Militia Web</h1>
        <p>Jetpack deathmatch with friends.</p>
        <label for="name">Name</label>
        <input id="name" maxlength="16" placeholder="Soldier" />
        <label for="code">Room code</label>
        <input id="code" maxlength="4" placeholder="ABCD" />
        <div class="row">
          <button id="create">Create room</button>
          <button id="join">Join</button>
        </div>
        <div id="err"></div>
        <div class="hint">
          Move: A / D &nbsp;·&nbsp; Jetpack: W or Space &nbsp;·&nbsp; Aim: mouse &nbsp;·&nbsp; Fire: click
        </div>
      </div>
    </div>
    <div id="game-overlay">
      <button id="start-match-btn">START MATCH</button>
      <div id="mobile-fire"></div>
      <div id="mobile-nade"></div>
    </div>
    <script type="module" src="/client/main.js" data-cfasync="false"></script>
  </body>
</html>
